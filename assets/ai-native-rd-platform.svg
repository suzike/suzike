  <text x="66" y="103" class="subtitle">Requirement -> Architecture -> Simulink Model -> MIL/HIL -> Calibration -> Knowledge Loop</text>

  <rect x="60" y="140" width="1160" height="250" rx="24" fill="rgba(2, 6, 23, 0.42)" stroke="rgba(125, 211, 252, 0.30)"/>
  <path d="M138 264H1142" stroke="url(#line)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

  <g filter="url(#glow)">
