    <rect class="chip" x="312" y="424" width="238" height="44" rx="22"/>
    <text x="336" y="452" class="small">Thermal Comfort Control</text>
    <rect class="chip" x="574" y="424" width="206" height="44" rx="22"/>
    <text x="598" y="452" class="small">LSTM / Offline RL</text>
    <rect class="chip" x="804" y="424" width="214" height="44" rx="22"/>
