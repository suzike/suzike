<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#082F49"/>
      <stop offset="1" stop-color="#052E16"/>
    </linearGradient>
    <linearGradient id="line" x1="120" y1="180" x2="1160" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.133 0 0 0 0 0.773 0 0 0 0 0.369 0 0 0 0.8 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #BAE6FD; }
      .nodeTitle { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .nodeSub { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #CFFAFE; }
      .small { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #86EFAC; }
      .chip { fill: rgba(2, 6, 23, 0.78); stroke: rgba(56, 189, 248, 0.55); stroke-width: 1; }
      .node { fill: rgba(15, 23, 42, 0.82); stroke: rgba(34, 197, 94, 0.72); stroke-width: 1.4; }
      .grid { stroke: rgba(148, 163, 184, 0.12); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1280" height="520" rx="28" fill="url(#bg)"/>
  <g opacity="0.45">
    <path class="grid" d="M80 0V520"/>
    <path class="grid" d="M200 0V520"/>
    <path class="grid" d="M320 0V520"/>
    <path class="grid" d="M440 0V520"/>
    <path class="grid" d="M560 0V520"/>
    <path class="grid" d="M680 0V520"/>
    <path class="grid" d="M800 0V520"/>
    <path class="grid" d="M920 0V520"/>
    <path class="grid" d="M1040 0V520"/>
    <path class="grid" d="M1160 0V520"/>
    <path class="grid" d="M0 80H1280"/>
    <path class="grid" d="M0 160H1280"/>
    <path class="grid" d="M0 240H1280"/>
    <path class="grid" d="M0 320H1280"/>
    <path class="grid" d="M0 400H1280"/>
    <path class="grid" d="M0 480H1280"/>
  </g>

  <circle cx="1010" cy="100" r="150" fill="#0EA5E9" opacity="0.12"/>
  <circle cx="320" cy="390" r="180" fill="#22C55E" opacity="0.10"/>

