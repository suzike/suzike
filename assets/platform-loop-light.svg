<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Native 研发闭环浅色图</title>
  <desc id="desc">汽车热管理 AI Native 研发平台浅色闭环图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="line" x1="118" y1="0" x2="1162" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0369A1"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#0284C7" opacity=".9"/>
    </marker>
    <style>
      .title { font: 700 26px 'Microsoft YaHei','Noto Sans SC','Segoe UI',Arial,sans-serif; fill: #0F172A; }
      .sub { font: 500 14px 'Microsoft YaHei','Noto Sans SC','Segoe UI',Arial,sans-serif; fill: #475569; }
      .nodeTitle { font: 700 14px 'Microsoft YaHei','Noto Sans SC','Segoe UI',Arial,sans-serif; fill: #075985; }
      .nodeSub { font: 500 12px 'Microsoft YaHei','Noto Sans SC','Segoe UI',Arial,sans-serif; fill: #64748B; }
      .panel { fill: rgba(255,255,255,.78); stroke: rgba(2,132,199,.22); }
      .node { fill: rgba(248,250,252,.96); stroke: rgba(2,132,199,.30); }
      .wire { stroke: url(#line); stroke-width: 2; stroke-linecap: round; fill: none; marker-end: url(#arrow); }
      .dot { fill: #0284C7; opacity: .95; }
    </style>
  </defs>
  <rect width="1280" height="420" rx="8" fill="url(#bg)"/>
